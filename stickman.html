<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Stickman Fight – Nexora</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
    }
    h1 {
      margin: 10px 0;
      color: #38bdf8;
    }
    #info {
      font-size: 0.9rem;
      margin-bottom: 5px;
      color: #9ca3af;
    }
    #gameContainer {
      position: relative;
    }
    canvas {
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 8px;
      display: block;
    }
    #hud {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
    }
    .bar {
      width: 200px;
      height: 12px;
      border-radius: 6px;
      background: #111827;
      border: 1px solid #1f2937;
      overflow: hidden;
    }
    .bar-inner-player {
      height: 100%;
      background: #22c55e;
      width: 100%;
    }
    .bar-inner-enemy {
      height: 100%;
      background: #ef4444;
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>Stickman Fight</h1>
  <div id="info">Pfeile: Laufen · Q: Schlag · W: Tritt</div>

  <div id="gameContainer">
    <canvas id="game" width="800" height="400"></canvas>
    <div id="hud">
      <div>
        Spieler
        <div class="bar"><div id="playerHpBar" class="bar-inner-player"></div></div>
      </div>
      <div>
        Gegner
        <div class="bar"><div id="enemyHpBar" class="bar-inner-enemy"></div></div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const playerHpBar = document.getElementById("playerHpBar");
    const enemyHpBar = document.getElementById("enemyHpBar");

    const groundY = 340;

    const player = {
      x: 150,
      y: groundY,
      width: 20,
      height: 60,
      color: "#38bdf8",
      vx: 0,
      speed: 3,
      hp: 100,
      maxHp: 100,
      facing: 1,
      punching: false,
      kicking: false,
      attackTimer: 0
    };

    const enemy = {
      x: 600,
      y: groundY,
      width: 20,
      height: 60,
      color: "#f97316",
      vx: 0,
      speed: 2,
      hp: 100,
      maxHp: 100,
      facing: -1,
      punching: false,
      kicking: false,
      attackTimer: 0
    };

    const keys = {
      ArrowLeft: false,
      ArrowRight: false,
      q: false,
      w: false
    };

    function updateHpBars() {
      playerHpBar.style.width = (player.hp / player.maxHp * 100) + "%";
      enemyHpBar.style.width = (enemy.hp / enemy.maxHp * 100) + "%";
    }

    function rect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawStickman(obj) {
      const bodyTop = obj.y - obj.height;
      const centerX = obj.x + obj.width / 2;

      // Körper
      rect(centerX - 2, bodyTop + 10, 4, 30, obj.color);
      // Kopf
      ctx.beginPath();
      ctx.strokeStyle = obj.color;
      ctx.lineWidth = 3;
      ctx.arc(centerX, bodyTop, 8, 0, Math.PI * 2);
      ctx.stroke();
      // Beine
      ctx.beginPath();
      ctx.moveTo(centerX, bodyTop + 40);
      ctx.lineTo(centerX - 10, obj.y);
      ctx.moveTo(centerX, bodyTop + 40);
      ctx.lineTo(centerX + 10, obj.y);
      ctx.stroke();
      // Arme
      ctx.beginPath();
      ctx.moveTo(centerX, bodyTop + 20);
      ctx.lineTo(centerX + 15 * obj.facing, bodyTop + 30);
      ctx.stroke();

      // Schlag / Tritt
      if (obj.punching) {
        ctx.beginPath();
        ctx.moveTo(centerX, bodyTop + 20);
        ctx.lineTo(centerX + 25 * obj.facing, bodyTop + 15);
        ctx.stroke();
      }
      if (obj.kicking) {
        ctx.beginPath();
        ctx.moveTo(centerX, bodyTop + 40);
        ctx.lineTo(centerX + 25 * obj.facing, bodyTop + 45);
        ctx.stroke();
      }
    }

    function handleInput() {
      player.vx = 0;
      if (keys.ArrowLeft) {
        player.vx = -player.speed;
        player.facing = -1;
      }
      if (keys.ArrowRight) {
        player.vx = player.speed;
        player.facing = 1;
      }

      if (keys.q && !player.punching && !player.kicking) {
        player.punching = true;
        player.attackTimer = 10;
        playerAttack("punch");
      }
      if (keys.w && !player.punching && !player.kicking) {
        player.kicking = true;
        player.attackTimer = 12;
        playerAttack("kick");
      }
    }

    function playerAttack(type) {
      const range = type === "punch" ? 40 : 50;
      const damage = type === "punch" ? 8 : 12;

      const dx = enemy.x - player.x;
      const inFront = (player.facing === 1 && dx > 0) || (player.facing === -1 && dx < 0);
      const dist = Math.abs(dx);

      if (inFront && dist < range) {
        enemy.hp = Math.max(0, enemy.hp - damage);
        updateHpBars();
      }
    }

    function enemyAI() {
      if (enemy.hp <= 0 || player.hp <= 0) return;

      const dx = player.x - enemy.x;
      const dist = Math.abs(dx);

      enemy.vx = 0;
      if (dist > 80) {
        enemy.vx = dx > 0 ? enemy.speed : -enemy.speed;
        enemy.facing = dx > 0 ? 1 : -1;
      } else {
        enemy.vx = 0;
        if (!enemy.punching && !enemy.kicking && Math.random() < 0.02) {
          if (Math.random() < 0.6) {
            enemy.punching = true;
            enemy.attackTimer = 10;
            enemyAttack("punch");
          } else {
            enemy.kicking = true;
            enemy.attackTimer = 12;
            enemyAttack("kick");
          }
        }
      }
    }

    function enemyAttack(type) {
      const range = type === "punch" ? 40 : 50;
      const damage = type === "punch" ? 6 : 10;

      const dx = player.x - enemy.x;
      const inFront = (enemy.facing === 1 && dx > 0) || (enemy.facing === -1 && dx < 0);
      const dist = Math.abs(dx);

      if (inFront && dist < range) {
        player.hp = Math.max(0, player.hp - damage);
        updateHpBars();
      }
    }

    function update() {
      handleInput();
      enemyAI();

      player.x += player.vx;
      enemy.x += enemy.vx;

      player.x = Math.max(40, Math.min(canvas.width - 60, player.x));
      enemy.x = Math.max(40, Math.min(canvas.width - 60, enemy.x));

      if (player.attackTimer > 0) {
        player.attackTimer--;
        if (player.attackTimer === 0) {
          player.punching = false;
          player.kicking = false;
        }
      }
      if (enemy.attackTimer > 0) {
        enemy.attackTimer--;
        if (enemy.attackTimer === 0) {
          enemy.punching = false;
          enemy.kicking = false;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Boden
      ctx.strokeStyle = "#1f2937";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, groundY + 1);
      ctx.lineTo(canvas.width, groundY + 1);
      ctx.stroke();

      drawStickman(player);
      drawStickman(enemy);

      if (player.hp <= 0 || enemy.hp <= 0) {
        ctx.fillStyle = "#e5e7eb";
        ctx.font = "24px Segoe UI";
        ctx.textAlign = "center";
        const msg = player.hp <= 0 ? "Du wurdest besiegt!" : "Du hast gewonnen!";
        ctx.fillText(msg, canvas.width / 2, 80);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    updateHpBars();
    loop();

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
        keys[e.key] = true;
      }
      if (e.key === "q" || e.key === "Q") keys.q = true;
      if (e.key === "w" || e.key === "W") keys.w = true;
    });

    window.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
        keys[e.key] = false;
      }
      if (e.key === "q" || e.key === "Q") keys.q = false;
      if (e.key === "w" || e.key === "W") keys.w = false;
    });
  </script>
</body>
</html>
