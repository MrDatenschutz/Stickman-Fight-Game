<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Stickman Fight – Nexora</title>
<style>
  body {
    margin: 0;
    background: #0f172a;
    color: #e5e7eb;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin: 10px 0;
    color: #38bdf8;
  }
  #gameContainer {
    position: relative;
  }
  canvas {
    background: #020617;
    border: 1px solid #1f2937;
    border-radius: 8px;
    display: block;
  }
  #hud {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
  }
  .bar {
    width: 200px;
    height: 12px;
    border-radius: 6px;
    background: #111827;
    border: 1px solid #1f2937;
    overflow: hidden;
  }
  .bar-inner-player {
    height: 100%;
    background: #22c55e;
    width: 100%;
  }
  .bar-inner-enemy {
    height: 100%;
    background: #ef4444;
    width: 100%;
  }
  #startBtn {
    margin-top: 10px;
    padding: 10px 20px;
    background: #38bdf8;
    color: #000;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
  }
  #countdown {
    position: absolute;
    top: 150px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 60px;
    color: #38bdf8;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Stickman Fight</h1>
<div>← → laufen · Q schlagen · W treten</div>
<button id="startBtn">Start</button>

<div id="gameContainer">
  <canvas id="game" width="800" height="400"></canvas>
  <div id="hud">
    <div>
      Spieler
      <div class="bar"><div id="playerHpBar" class="bar-inner-player"></div></div>
    </div>
    <div>
      Gegner
      <div class="bar"><div id="enemyHpBar" class="bar-inner-enemy"></div></div>
    </div>
  </div>
  <div id="countdown"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const playerHpBar = document.getElementById("playerHpBar");
const enemyHpBar = document.getElementById("enemyHpBar");
const countdownEl = document.getElementById("countdown");
const startBtn = document.getElementById("startBtn");

let gameRunning = false;
const groundY = 340;

const STATE_IDLE   = "idle";
const STATE_PUNCH  = "punch";
const STATE_KICK   = "kick";
const STATE_HIT    = "hit";
const STATE_GRAB   = "grab";
const STATE_THROW  = "throw";

function makeFighter(x, color, facing) {
  return {
    x,
    y: groundY,
    width: 20,
    height: 60,
    color,
    vx: 0,
    speed: 3,
    hp: 100,
    maxHp: 100,
    facing,
    state: STATE_IDLE,
    frame: 0,
    frameTimer: 0,
    grabbed: false
  };
}

const player = makeFighter(150, "#38bdf8", 1);
const enemy  = makeFighter(600, "#f97316", -1);
enemy.hp = enemy.maxHp = 130; // etwas stärker

const keys = { ArrowLeft:false, ArrowRight:false, q:false, w:false };

function updateHpBars() {
  playerHpBar.style.width = (player.hp / player.maxHp * 100) + "%";
  enemyHpBar.style.width  = (enemy.hp  / enemy.maxHp  * 100) + "%";
}

function drawStickman(f) {
  const bodyTop = f.y - f.height;
  const cx = f.x + f.width / 2;

  ctx.strokeStyle = f.color;
  ctx.lineWidth = 3;

  // Kopf
  ctx.beginPath();
  ctx.arc(cx, bodyTop, 8, 0, Math.PI * 2);
  ctx.stroke();

  // Körper
  ctx.beginPath();
  ctx.moveTo(cx, bodyTop + 10);
  ctx.lineTo(cx, bodyTop + 40);
  ctx.stroke();

  // Beine (Basis)
  ctx.beginPath();
  ctx.moveTo(cx, bodyTop + 40);
  ctx.lineTo(cx - 10, f.y);
  ctx.moveTo(cx, bodyTop + 40);
  ctx.lineTo(cx + 10, f.y);
  ctx.stroke();

  // Arme/Beine je nach State/Frame
  const dir = f.facing;

  // Idle / Hit / Grab / Throw Grundarm
  ctx.beginPath();
  ctx.moveTo(cx, bodyTop + 20);
  ctx.lineTo(cx + 15 * dir, bodyTop + 30);
  ctx.stroke();

  if (f.state === STATE_PUNCH) {
    // 4 Frames: 0 = ausholen, 1–2 = Treffer, 3 = zurück
    ctx.beginPath();
    ctx.moveTo(cx, bodyTop + 20);
    let reach = 15;
    if (f.frame === 1 || f.frame === 2) reach = 30;
    if (f.frame === 0) reach = 10;
    ctx.lineTo(cx + reach * dir, bodyTop + 15);
    ctx.stroke();
  }

  if (f.state === STATE_KICK) {
    // 4 Frames: 0 = Bein hebt, 1–2 = ausgestreckt, 3 = zurück
    ctx.beginPath();
    ctx.moveTo(cx, f.y);
    let reach = 10;
    if (f.frame === 1 || f.frame === 2) reach = 30;
    if (f.frame === 0) reach = 15;
    ctx.lineTo(cx + reach * dir, f.y + 5);
    ctx.stroke();
  }

  if (f.state === STATE_GRAB) {
    ctx.beginPath();
    ctx.moveTo(cx, bodyTop + 20);
    ctx.lineTo(cx + 25 * dir, bodyTop + 10);
    ctx.stroke();
  }

  if (f.state === STATE_THROW) {
    ctx.beginPath();
    ctx.moveTo(cx, bodyTop + 20);
    ctx.lineTo(cx + 30 * dir, bodyTop + 5);
    ctx.stroke();
  }

  if (f.state === STATE_HIT) {
    // kleiner Rückstoß
    ctx.beginPath();
    ctx.moveTo(cx, bodyTop + 20);
    ctx.lineTo(cx - 10 * dir, bodyTop + 25);
    ctx.stroke();
  }
}

function startAnimation(f, state) {
  f.state = state;
  f.frame = 0;
  f.frameTimer = 0;
}

function handleInput() {
  if (player.grabbed) return;

  player.vx = 0;
  if (keys.ArrowLeft) {
    player.vx = -player.speed;
    player.facing = -1;
  }
  if (keys.ArrowRight) {
    player.vx = player.speed;
    player.facing = 1;
  }

  if (player.state === STATE_IDLE || player.state === STATE_HIT) {
    if (keys.q) {
      startAnimation(player, STATE_PUNCH);
    } else if (keys.w) {
      startAnimation(player, STATE_KICK);
    }
  }
}

function distance(a, b) {
  return Math.abs(a.x - b.x);
}

function inFront(attacker, target, range) {
  const dx = target.x - attacker.x;
  const front = (attacker.facing === 1 && dx > 0) || (attacker.facing === -1 && dx < 0);
  return front && Math.abs(dx) < range;
}

function applyHit(attacker, target, dmg, knockback) {
  target.hp = Math.max(0, target.hp - dmg);
  target.x += knockback * (attacker.facing);
  startAnimation(target, STATE_HIT);
  updateHpBars();
}

function updateFighterAnimation(f, isPlayer) {
  if (f.state === STATE_IDLE) return;

  f.frameTimer++;
  if (f.frameTimer >= 4) { // 4 Ticks pro Frame
    f.frameTimer = 0;
    f.frame++;
  }

  if (f.state === STATE_PUNCH) {
    // Trefferfenster bei Frame 1 & 2
    if (f.frame === 1 || f.frame === 2) {
      const target = isPlayer ? enemy : player;
      if (inFront(f, target, 45)) {
        applyHit(f, target, isPlayer ? 10 : 7, isPlayer ? 6 : -4);
      }
    }
    if (f.frame > 3) {
      f.state = STATE_IDLE;
      f.frame = 0;
    }
  }

  if (f.state === STATE_KICK) {
    // Trefferfenster bei Frame 1 & 2
    if (f.frame === 1 || f.frame === 2) {
      const target = isPlayer ? enemy : player;
      if (inFront(f, target, 60)) {
        applyHit(f, target, isPlayer ? 14 : 9, isPlayer ? 10 : -6);
      }
    }
    if (f.frame > 3) {
      f.state = STATE_IDLE;
      f.frame = 0;
    }
  }

  if (f.state === STATE_HIT) {
    if (f.frame > 2) {
      f.state = STATE_IDLE;
      f.frame = 0;
    }
  }

  if (f.state === STATE_GRAB) {
    if (isPlayer) return; // nur Gegner greift
    const target = player;
    // während Grab: Spieler an Gegner "kleben"
    target.x = f.x + f.facing * 25;
    target.grabbed = true;

    if (f.frame === 1 || f.frame === 2) {
      if (f.frameTimer === 0) { // alle 4 Ticks
        target.hp = Math.max(0, target.hp - 4);
        updateHpBars();
      }
    }
    if (f.frame > 3) {
      // Wurf einleiten
      startAnimation(f, STATE_THROW);
      target.grabbed = false;
      target.x += f.facing * 80;
      applyHit(f, target, 6, 0);
    }
  }

  if (f.state === STATE_THROW) {
    if (f.frame > 2) {
      f.state = STATE_IDLE;
      f.frame = 0;
    }
  }
}

function enemyAI() {
  if (enemy.hp <= 0 || player.hp <= 0) return;

  const dist = distance(enemy, player);
  enemy.vx = 0;

  if (enemy.state === STATE_IDLE || enemy.state === STATE_HIT) {
    if (dist > 90) {
      enemy.vx = (player.x > enemy.x ? enemy.speed : -enemy.speed);
      enemy.facing = player.x > enemy.x ? 1 : -1;
    } else {
      // Entscheidung: Punch, Kick oder Grab
      const r = Math.random();
      if (r < 0.04) {
        startAnimation(enemy, STATE_PUNCH);
      } else if (r < 0.07) {
        startAnimation(enemy, STATE_KICK);
      } else if (r < 0.09 && dist < 70) {
        startAnimation(enemy, STATE_GRAB);
      }
    }
  }
}

function update() {
  if (!gameRunning) return;

  handleInput();
  enemyAI();

  player.x += player.vx;
  enemy.x  += enemy.vx;

  player.x = Math.max(40, Math.min(canvas.width - 60, player.x));
  enemy.x  = Math.max(40, Math.min(canvas.width - 60, enemy.x));

  updateFighterAnimation(player, true);
  updateFighterAnimation(enemy, false);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Boden
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY + 1);
  ctx.lineTo(canvas.width, groundY + 1);
  ctx.stroke();

  drawStickman(player);
  drawStickman(enemy);

  if (player.hp <= 0 || enemy.hp <= 0) {
    ctx.fillStyle = "#e5e7eb";
    ctx.font = "24px Segoe UI";
    ctx.textAlign = "center";
    const msg = player.hp <= 0 ? "Du wurdest besiegt!" : "Du hast gewonnen!";
    ctx.fillText(msg, canvas.width / 2, 80);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
updateHpBars();

window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft" || e.key === "ArrowRight") keys[e.key] = true;
  if (e.key === "q" || e.key === "Q") keys.q = true;
  if (e.key === "w" || e.key === "W") keys.w = true;
});

window.addEventListener("keyup", (e) => {
  if (e.key === "ArrowLeft" || e.key === "ArrowRight") keys[e.key] = false;
  if (e.key === "q" || e.key === "Q") keys.q = false;
  if (e.key === "w" || e.key === "W") keys.w = false;
});

startBtn.addEventListener("click", () => {
  startBtn.style.display = "none";
  let count = 3;
  countdownEl.textContent = count;

  const interval = setInterval(() => {
    count--;
    if (count === 0) {
      countdownEl.textContent = "GO!";
    } else if (count < 0) {
      countdownEl.textContent = "";
      clearInterval(interval);
      gameRunning = true;
    } else {
      countdownEl.textContent = count;
    }
  }, 1000);
});
</script>

</body>
</html>
